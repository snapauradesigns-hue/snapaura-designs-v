<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard | Snap Aura Admin</title>

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/logo.png" class="brand-logo" />

          <h2>Snap Aura</h2>
        </div>

        <nav>
          <a class="active" href="dashboard.html">Dashboard</a>

          <a href="portfolio.html">Portfolio</a>

          <a href="contacts.html">Contacts</a>

          <a href="settings.html">Settings</a>
        </nav>

        <button class="logout-btn" onclick="logout()">Logout</button>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Dashboard</h1>

          <div class="admin-name">Administrator</div>
        </header>

        <section class="cards">
          <div class="card">
            <h2 id="projects">0</h2>

            <p>Total Projects</p>
          </div>

          <div class="card">
            <h2 id="contacts">0</h2>

            <p>Enquiries</p>
          </div>

          <div class="card">
            <h2 id="featured">0</h2>

            <p>Featured</p>
          </div>

          <div class="card">
            <h2 id="categories">0</h2>

            <p>Categories</p>
          </div>
        </section>

        <section class="dashboard-grid">
          <div class="panel">
            <h3>System Status</h3>

            <p id="backendStatus">Checking...</p>

            <p id="databaseStatus">Checking...</p>
          </div>

          <div class="panel">
            <h3>Quick Actions</h3>

            <button onclick="location.href = 'portfolio.html'">
              Add Project
            </button>

            <button onclick="location.href = 'contacts.html'">
              View Enquiries
            </button>
          </div>
        </section>
      </main>
    </div>
    <script src="js/sidebar.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
