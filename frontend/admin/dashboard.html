<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Snap Aura Admin</title>

    <link rel="stylesheet" href="css/admin.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->

      <aside class="sidebar">
        <h2>Snap Aura</h2>

        <ul>
          <li class="active">
            <a href="dashboard.html">Dashboard</a>
          </li>

          <li>
            <a href="portfolio.html">Portfolio</a>
          </li>

          <li>
            <a href="contacts.html">Contacts</a>
          </li>

          <li>
            <a href="settings.html">Settings</a>
          </li>

          <li>
            <a href="login.html" onclick="localStorage.removeItem('token')"
              >Logout</a
            >
          </li>
        </ul>
      </aside>

      <!-- Main -->

      <main class="main">
        <header class="topbar">
          <h1>Dashboard</h1>
        </header>

        <!-- Stats -->

        <section class="stats">
          <div class="stat-card">
            <span id="totalProjects">0</span>

            <p>Projects</p>
          </div>
          <div class="stat-card">
            <span id="featuredProjects">0</span>

            <p>Featured</p>
          </div>

          <div class="stat-card">
            <span id="totalCategories">0</span>

            <p>Categories</p>
          </div>

          <div class="stat-card">
            <span id="totalMessages">0</span>

            <p>Messages</p>
          </div>
        </section>
      </main>
    </div>

    <script src="../assets/js/config.js"></script>

    <script src="js/dashboard.js"></script>
  </body>
</html>
