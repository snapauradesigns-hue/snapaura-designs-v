<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Snap Aura Admin Dashboard</title>

    <link rel="stylesheet" href="css/admin.css" />
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="logo">Snap Aura</div>

        <ul>
          <li class="active">
            <a href="dashboard.html">Dashboard</a>
          </li>

          <li>
            <a href="portfolio.html">Portfolio</a>
          </li>

          <li>
            <a href="contacts.html">Contacts</a>
          </li>

          <li>
            <a href="settings.html">Settings</a>
          </li>

          <li>
            <a href="#" id="logoutBtn">Logout</a>
          </li>
        </ul>
      </aside>

      <!-- Main -->

      <main class="main">
        <div class="topbar">
          <h1>Dashboard</h1>

          <button class="btn" onclick="location.href = 'portfolio.html'">
            + Add Project
          </button>
        </div>

        <section class="stats">
          <div class="card">
            <h2 id="totalProjects">0</h2>

            <p>Total Projects</p>
          </div>

          <div class="card">
            <h2 id="featuredProjects">0</h2>

            <p>Featured Projects</p>
          </div>

          <div class="card">
            <h2 id="totalCategories">0</h2>

            <p>Categories</p>
          </div>

          <div class="card">
            <h2 id="totalMessages">0</h2>

            <p>Contact Messages</p>
          </div>
        </section>

        <div class="table">
          <table>
            <thead>
              <tr>
                <th>System Status</th>

                <th>Value</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>Backend</td>

                <td id="backendStatus"><div class="loader"></div></td>
              </tr>

              <tr>
                <td>Database</td>

                <td id="databaseStatus"><div class="loader"></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
