<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Portfolio | Snap Aura Designs</title>

    <link rel="stylesheet" href="css/admin.css" />
    <link rel="icon" type="image/png" href="../favicon.png" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard">
      <!-- Sidebar -->

      <aside class="sidebar">
        <div class="logo">Snap Aura</div>

        <ul>
          <li>
            <a href="dashboard.html">Dashboard</a>
          </li>

          <li class="active">
            <a href="portfolio.html">Portfolio</a>
          </li>

          <li>
            <a href="contacts.html">Contacts</a>
          </li>

          <li>
            <a href="settings.html">Settings</a>
          </li>

          <li>
            <a href="#" id="logoutBtn">Logout</a>
          </li>
        </ul>
      </aside>

      <!-- Main -->

      <main class="main">
        <div class="topbar">
          <h1>Portfolio Manager</h1>

          <div style="display: flex; gap: 15px">
            <button class="btn" id="refreshBtn">Refresh</button>

            <button class="btn" id="addBtn">+ Add Project</button>
          </div>
        </div>

        <div class="table">
          <table>
            <thead>
              <tr>
                <th>Preview</th>

                <th>Title</th>

                <th>Brand</th>

                <th>Category</th>

                <th>Featured</th>

                <th>Actions</th>
              </tr>
            </thead>

            <tbody id="portfolioTable">
              <tr>
                <td colspan="6"><div class="loader"></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div class="modal" id="projectModal">
      <div class="modal-content">
        <h2>Add Project</h2>

        <input id="title" placeholder="Project Title" />

        <input id="brand" placeholder="Brand Name" />

        <select id="category">
          <option>Logo</option>

          <option>Branding</option>

          <option>Packaging</option>

          <option>Social Media</option>

          <option>Marketing</option>
        </select>

        <textarea id="description" placeholder="Description"></textarea>

        <input type="file" id="image" />

        <label>
          <input type="checkbox" id="featured" />

          Featured Project
        </label>

        <br /><br />

        <button class="btn" id="saveProject">Upload Project</button>

        <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/portfolio.js"></script>
  </body>
</html>
