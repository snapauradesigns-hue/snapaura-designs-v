<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>Portfolio Manager</title>

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/logo.png" class="brand-logo" />

          <h2>Snap Aura</h2>
        </div>

        <nav>
          <a href="dashboard.html"> Dashboard </a>

          <a class="active" href="portfolio.html"> Portfolio </a>

          <a href="contacts.html"> Contacts </a>

          <a href="settings.html"> Settings </a>
        </nav>

        <button class="logout-btn" onclick="logout()">Logout</button>
      </aside>

      <main class="main">
        <div class="page-header">
          <h1>Portfolio</h1>

          <div class="actions">
            <input id="searchInput" placeholder="Search Project" />

            <button id="refreshBtn">Refresh</button>

            <button id="addBtn">+ Add Project</button>
          </div>
        </div>

        <div id="portfolioGrid" class="portfolio-grid"></div>
      </main>
    </div>

    <!-- Modal -->

    <div id="projectModal" class="modal">
      <div class="modal-card">
        <h2 id="modalTitle">Add Project</h2>

        <input id="title" placeholder="Project Title" />

        <input id="brand" placeholder="Brand Name" />

        <select id="category">
          <option>Logo</option>

          <option>Branding</option>

          <option>Packaging</option>

          <option>Social Media</option>

          <option>Marketing</option>
        </select>

        <textarea id="description" placeholder="Description"> </textarea>

        <input type="file" id="image" />

        <label>
          <input type="checkbox" id="featured" />

          Featured
        </label>

        <div class="modal-buttons">
          <button id="saveBtn">Save</button>

          <button onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
    <script src="js/sidebar.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/portfolio.js"></script>
  </body>
</html>
