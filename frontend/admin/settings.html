<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Settings | Snap Aura Admin</title>

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="dashboard">
      <aside class="sidebar">
        <h2>Snap Aura</h2>

        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>

          <li><a href="portfolio.html">Portfolio</a></li>

          <li><a href="contacts.html">Contacts</a></li>

          <li class="active"><a href="settings.html">Settings</a></li>

          <li>
            <a href="login.html" onclick="logout()">Logout</a>
          </li>
        </ul>
      </aside>

      <main class="main">
        <header class="topbar">
          <h1>Settings</h1>
        </header>

        <div class="settings-container">
          <div class="settings-card">
            <h2>Admin Information</h2>

            <input
              type="text"
              id="adminName"
              placeholder="Admin Name"
              value="Sorna Ganesh"
            />

            <input
              type="email"
              id="adminEmail"
              placeholder="Email"
              value="admin@snapaura.com"
            />
          </div>

          <div class="settings-card">
            <h2>Change Password</h2>

            <input
              type="password"
              id="currentPassword"
              placeholder="Current Password"
            />

            <input
              type="password"
              id="newPassword"
              placeholder="New Password"
            />

            <input
              type="password"
              id="confirmPassword"
              placeholder="Confirm Password"
            />

            <button id="changePasswordBtn">Update Password</button>
          </div>

          <div class="settings-card">
            <h2>Website Settings</h2>

            <input type="text" id="websiteName" value="Snap Aura Designs" />

            <input type="email" id="contactEmail" value="admin@snapaura.com" />

            <input type="text" id="phone" placeholder="Phone Number" />

            <button id="saveSettingsBtn">Save Changes</button>
          </div>
        </div>
      </main>
    </div>

    <script src="js/settings.js"></script>
  </body>
</html>
