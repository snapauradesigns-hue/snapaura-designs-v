<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

    <title>Settings</title>

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <img src="assets/logo.png" class="brand-logo" />

          <h2>Snap Aura</h2>
        </div>

        <nav>
          <a href="dashboard.html"> Dashboard </a>

          <a href="portfolio.html"> Portfolio </a>

          <a href="contacts.html"> Contacts </a>

          <a class="active" href="settings.html"> Settings </a>
        </nav>

        <button class="logout-btn" onclick="logout()">Logout</button>
      </aside>

      <main class="main">
        <h1>Settings</h1>

        <form id="settingsForm">
          <input id="websiteName" placeholder="Website Name" />

          <input id="phone" placeholder="Phone" />

          <input id="email" placeholder="Email" />

          <input id="instagram" placeholder="Instagram" />

          <input id="facebook" placeholder="Facebook" />

          <input id="linkedin" placeholder="LinkedIn" />

          <input id="whatsapp" placeholder="WhatsApp" />

          <textarea id="footerText" placeholder="Footer Text"> </textarea>

          <button type="submit">Save Settings</button>
        </form>
      </main>
    </div>
    <script src="js/sidebar.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/settings.js"></script>
  </body>
</html>
