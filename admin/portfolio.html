<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Portfolio Manager</title>

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="container">
      <h1>Portfolio Management</h1>

      <div class="toolbar">
        <input type="text" id="search" placeholder="Search project..." />

        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="Logo">Logo</option>
          <option value="Branding">Branding</option>
          <option value="Packaging">Packaging</option>
          <option value="Marketing">Marketing</option>
          <option value="Social Media">Social Media</option>
          <option value="Website">Website</option>
        </select>

        <button id="newProjectBtn">+ Add Project</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Preview</th>

            <th>Title</th>

            <th>Brand</th>

            <th>Category</th>

            <th>Featured</th>

            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="portfolioTable"></tbody>
      </table>
    </div>
    <!-- Upload Modal -->

    <div id="projectModal" class="modal">
      <div class="modal-content">
        <span id="closeModal" class="close">&times;</span>

        <h2>Add New Project</h2>

        <form id="projectForm">
          <input
            type="text"
            name="title"
            placeholder="Project Title"
            required
          />

          <input type="text" name="brand" placeholder="Brand Name" required />

          <select name="category">
            <option>Logo</option>
            <option>Branding</option>
            <option>Packaging</option>
            <option>Marketing</option>
            <option>Social Media</option>
            <option>Website</option>
          </select>

          <textarea name="description" placeholder="Description"></textarea>

          <input type="file" name="image" id="imageInput" required />

          <img
            id="preview"
            style="display: none; width: 100%; border-radius: 10px"
          />

          <label>
            <input type="checkbox" name="featured" />

            Featured Project
          </label>

          <button type="submit">Upload Project</button>
        </form>
      </div>
    </div>
    <script src="../frontend/assets/js/config.js"></script>
    <script src="js/portfolioManager.js"></script>
  </body>
</html>
